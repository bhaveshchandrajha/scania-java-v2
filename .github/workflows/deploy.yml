name: Deploy Warranty System to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/warranty-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.27.167.200
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login to Docker Hub
            echo ${{ secrets.DOCKERHUB_TOKEN }} | sudo docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
            
            # Stop the old container
            sudo docker stop warranty-container || true
            sudo docker rm warranty-container || true
            
            # Pull the latest image
            sudo docker pull ${{ secrets.DOCKERHUB_USERNAME }}/warranty-app:latest
            
            # Run the new container with RDS PostgreSQL
            # (Mapping EC2 Port 80 to Spring Boot Port 8081)
            sudo docker run -d \
              --name warranty-container \
              -p 80:8081 \
              -e SPRING_PROFILES_ACTIVE=rds \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/warranty-app:latest
